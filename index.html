<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Robot Web UI</title>
    <style>
      body { font-family: sans-serif; padding: 20px; }
      #status { margin-bottom: 20px; font-weight: bold; }
      .hub-section { margin-bottom: 20px; padding: 15px; border: 1px solid #ccc; background-color: #f9f9f9; }
      .connected { color: green; }
      .disconnected { color: red; }
    </style>
  </head>
  <body>
    <h3>Robot Web UI (WebSocket Relay)</h3>
    
    <div class="hub-section">
      <label for="relayUrl"><b>Relay Server URL:</b></label>
      <input type="text" id="relayUrl" value="ws://127.0.0.1:5056" style="width: 250px;">
      <br><br>
      <label for="hubId"><b>HUB ID:</b></label>
      <input type="text" id="hubId" placeholder="e.g. XR2B9" style="text-transform: uppercase;">
      <button id="connectBtn">Connect to Hub</button>
      <div id="status" class="disconnected">Not Connected</div>
    </div>

    <form id="form">
      <label for="mode">Mode:</label>
      <select id="mode">
        <option value="kinematics">Kinematics</option>
        <option value="omx_kinematics">OMX Kinematics</option>
      </select>
      <br><br>
      <textarea id="code" rows="20" cols="80" placeholder="Paste Python code here"></textarea>
      <br><br>
      <button type="submit" id="runBtn" disabled>Run Code</button>
    </form>
    <h4>Output:</h4>
    <pre id="output" style="background:#eee; padding:10px; min-height: 100px; border:1px solid #ccc;"></pre>

    <script>
      const form = document.getElementById('form');
      const output = document.getElementById('output');
      const code = document.getElementById('code');
      const mode = document.getElementById('mode');
      const statusEl = document.getElementById('status');
      const hubIdInput = document.getElementById('hubId');
      const relayUrlInput = document.getElementById('relayUrl');
      const connectBtn = document.getElementById('connectBtn');
      const runBtn = document.getElementById('runBtn');
      
      let ws = null;
      let currentHubId = null;

      function setStatus(message, isConnected = false) {
        statusEl.textContent = message;
        statusEl.className = isConnected ? 'connected' : 'disconnected';
      }

      connectBtn.addEventListener('click', () => {
        const hubId = hubIdInput.value.trim().toUpperCase();
        const relayUrl = relayUrlInput.value.trim();
        
        if (!hubId || !relayUrl) {
          alert("Please enter a Relay URL and Hub ID");
          return;
        }

        if (ws) {
          ws.close(); // Disconnect existing client
        }

        currentHubId = hubId;
        setStatus('Connecting to relay...', false);
        
        try {
          ws = new WebSocket(relayUrl);
        } catch(e) {
          setStatus(`Connection Error: ${e.message}`, false);
          return;
        }

        ws.onopen = () => {
          setStatus(`Connected to relay. Registering Browser for Hub ${currentHubId}...`, false);
          
          ws.send(JSON.stringify({
              type: 'register',
              role: 'browser',
              hub_id: currentHubId
          }));
        };

        ws.onmessage = (event) => {
          try {
            const payload = JSON.parse(event.data);
            if (payload.type === 'connection') {
              if (payload.status === 'online') {
                setStatus(`Connected to Hub: ${currentHubId}`, true);
                runBtn.disabled = false;
                output.textContent += "Hub is Online.\n";
              } else {
                setStatus(`Hub ${currentHubId} is Offline`, false);
                runBtn.disabled = true;
                output.textContent += "Hub disconnected.\n";
              }
            } else if (payload.type === 'status') {
              output.textContent += '[status] ' + (payload.message || '') + '\n';
            } else if (payload.type === 'output') {
              output.textContent += payload.data?.data || '';
            } else if (payload.type === 'finished') {
              output.textContent += '\n[finished] ' + (payload.message || '') + '\n';
            } else if (payload.type === 'error') {
              output.textContent += '\n[error] ' + (payload.message || '') + '\n';
            }
          } catch (e) {
            console.error("Invalid JSON message received", e);
          }
        };

        ws.onerror = (err) => {
          setStatus(`WebSocket Error`, false);
          runBtn.disabled = true;
        };

        ws.onclose = () => {
          setStatus('Disconnected from relay', false);
          runBtn.disabled = true;
        };
      });

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        if (!ws || ws.readyState !== WebSocket.OPEN || !currentHubId) {
          alert("Not connected to a Hub.");
          return;
        }
        
        output.textContent = '';
        const payload = JSON.stringify({ 
          type: 'run_code', 
          role: 'browser', 
          data: { code: code.value, mode: mode.value } 
        });
        
        setStatus('Sending code to hub...', true);
        ws.send(payload);
      });
    </script>
  </body>
</html>
