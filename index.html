<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HUB Control Center</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    :root {
      --bg-color: #0f172a;
      --panel-bg: rgba(30, 41, 59, 0.7);
      --border-color: rgba(255, 255, 255, 0.1);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-color);
      background-image: radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                        radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.15), transparent 25%);
      color: var(--text-main);
      min-height: 100vh;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 1000px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }

    h1 {
      text-align: center;
      font-weight: 700;
      font-size: 2.5rem;
      background: linear-gradient(135deg, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2rem;
    }

    .panel {
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .panel:hover {
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    }

    .header-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      justify-content: space-between;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input, select, textarea {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
    }
    textarea {
      resize: vertical;
      min-height: 200px;
      font-family: 'Fira Code', monospace;
    }

    button {
      background: linear-gradient(135deg, var(--accent), #60a5fa);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }
    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
    }
    button:active:not(:disabled) {
      transform: translateY(0);
    }
    button:disabled {
      background: rgba(71, 85, 105, 0.5);
      color: var(--text-muted);
      cursor: not-allowed;
      box-shadow: none;
    }

    .status-indicator {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid var(--border-color);
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .status-disconnected .status-dot { background-color: var(--danger); box-shadow: 0 0 8px var(--danger); }
    .status-connected .status-dot { background-color: var(--success); box-shadow: 0 0 8px var(--success); }
    .status-connecting .status-dot { background-color: var(--warning); box-shadow: 0 0 8px var(--warning); }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
      display: none;
      animation: fadeIn 0.5s ease forwards;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

    .stat-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 0.25rem;
    }
    .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .editor-section {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .controls-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .controls-row .form-group {
      flex: 1;
      min-width: 200px;
    }

    .terminal {
      background: #0f172a;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 1rem;
      font-family: 'Fira Code', monospace;
      font-size: 0.9rem;
      color: #a7f3d0;
      min-height: 200px;
      max-height: 400px;
      overflow-y: auto;
      white-space: pre-wrap;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

  <h1>HUB Control Center</h1>

  <div class="container">
    
    <!-- Connection Panel -->
    <div class="panel">
      <div class="header-row">
        <div class="form-group" style="flex: 1;">
          <label for="hubId">HUB ID</label>
          <div style="display: flex; gap: 1rem;">
            <input type="text" id="hubId" placeholder="e.g. HUB01" style="text-transform: uppercase; flex: 1;">
            <button id="connectBtn">Connect</button>
          </div>
        </div>
        <div id="statusIndicator" class="status-indicator status-disconnected">
          <div class="status-dot"></div>
          <span id="statusText">Disconnected</span>
        </div>
      </div>

      <div class="stats-grid" id="statsSection">
        <div class="stat-card">
          <div class="stat-value" id="statUsers">0</div>
          <div class="stat-label">Active Users</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statRan">0</div>
          <div class="stat-label">Scripts Executed</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statPending">0</div>
          <div class="stat-label">Queue Length</div>
        </div>
      </div>
    </div>

    <!-- Execution Panel -->
    <div class="panel editor-section">
      <div class="controls-row">
        <div class="form-group">
          <label for="targetSlot">Target Robot</label>
          <select id="targetSlot">
            <option value="">Any Available</option>
          </select>
        </div>
        <div class="form-group">
          <label for="mode">Mode</label>
          <select id="mode">
            <option value="kinematics">Kinematics</option>
            <option value="omx_kinematics">OMX Kinematics</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <div class="header-row" style="margin-bottom: 0.5rem;">
          <label for="code">Python Usercode</label>
          <div id="jobStatusBar" class="status-indicator status-connecting" style="display: none;">
            <div class="status-dot"></div>
            <span id="jobStatusText">Waiting...</span>
          </div>
        </div>
        <textarea id="code" placeholder="# Write your robot automation script here...&#10;print('Hello World')"></textarea>
      </div>

      <div style="display: flex; gap: 1rem;">
        <button id="runBtn" disabled style="flex: 1;">Execute Script</button>
        <button id="stopBtn" disabled style="flex: 1; background: linear-gradient(135deg, var(--danger), #f87171); box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);">Stop Execution</button>
      </div>
    </div>

    <!-- Terminal Panel -->
    <div class="panel">
      <label style="display: flex; align-items: center; gap: 0.75rem;">
        Live Output 
        <span id="wsIndicator" style="font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; background: #374151; color: #9ca3af;">⏳ WS…</span>
        <span id="latencyIndicator" style="font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; background: #374151; color: #9ca3af; display: none;">0ms</span>
      </label>
      <div class="terminal" id="output"></div>
    </div>

  </div>

  <script>
    const output = document.getElementById('output');
    const code = document.getElementById('code');
    const mode = document.getElementById('mode');
    const targetSlot = document.getElementById('targetSlot');
    const statusText = document.getElementById('statusText');
    const statusIndicator = document.getElementById('statusIndicator');
    const hubIdInput = document.getElementById('hubId');
    const connectBtn = document.getElementById('connectBtn');
    const runBtn = document.getElementById('runBtn');
    const stopBtn = document.getElementById('stopBtn');
    const jobStatusBar = document.getElementById('jobStatusBar');
    const jobStatusText = document.getElementById('jobStatusText');
    const statsSection = document.getElementById('statsSection');
    const statUsers = document.getElementById('statUsers');
    const statRan = document.getElementById('statRan');
    const statPending = document.getElementById('statPending');

    let client = null;
    let currentHubId = null;
    let wsClient = null;
    let wsConnected = false;
    const clientId = 'web_' + Math.random().toString(16).substring(2, 10);
    const wsIndicator = document.getElementById('wsIndicator');

    function setStatus(state, message) {
      statusIndicator.className = `status-indicator status-${state}`;
      statusText.textContent = message;
      if(state === 'disconnected') {
        runBtn.disabled = true;
        stopBtn.disabled = true;
        statsSection.style.display = 'none';
        jobStatusBar.style.display = 'none';
      }
    }

    function setJobStatus(state, message) {
      jobStatusBar.style.display = 'inline-flex';
      let stateClass = 'connecting';
      if (state === 'running' || state === 'completed') stateClass = 'connected';
      else if (state === 'error' || state === 'stopped') stateClass = 'disconnected';
      
      jobStatusBar.className = `status-indicator status-${stateClass}`;
      jobStatusText.textContent = message;
    }

    // -- High-performance terminal rendering --
    // Buffer text and flush to DOM once per animation frame (~16ms)
    let _termBuf = [];
    let _termRAF = null;

    function appendOutput(text, type = 'normal') {
      if (!text) return;
      _termBuf.push({ text, type });
      if (!_termRAF) {
        _termRAF = requestAnimationFrame(_flushTerminal);
      }
    }

    function _flushTerminal() {
      _termRAF = null;
      if (_termBuf.length === 0) return;

      for (const item of _termBuf) {
        let text = item.text;
        let isOverwrite = false;
        
        if (text.includes('\r')) {
            isOverwrite = true;
            text = text.replace(/\r/g, '');
        }
        
        if (!text && isOverwrite) continue;

        if (isOverwrite && output.lastChild && output.lastChild.dataset.overwrite === 'true') {
            output.lastChild.textContent = text;
        } else {
            const span = document.createElement('span');
            if (item.type === 'error') span.style.color = '#f87171';
            if (item.type === 'system') span.style.color = '#60a5fa';
            if (isOverwrite) span.dataset.overwrite = 'true';
            
            span.textContent = text;
            output.appendChild(span);
        }
      }
      _termBuf.length = 0;

      // Limit DOM nodes to prevent browser freezing
      while (output.childNodes.length > 300) {
        output.removeChild(output.firstChild);
      }

      output.scrollTop = output.scrollHeight;
    }

    function updateLatency(hubTs) {
      if (!hubTs) return;
      const latency = Date.now() - hubTs;
      const ind = document.getElementById('latencyIndicator');
      ind.style.display = 'inline-block';
      ind.textContent = `${latency}ms`;
      if (latency < 50) {
          ind.style.background = '#065f46';
          ind.style.color = '#34d399';
      } else if (latency < 200) {
          ind.style.background = '#78350f';
          ind.style.color = '#fbbf24';
      } else {
          ind.style.background = '#7f1d1d';
          ind.style.color = '#f87171';
      }
    }

    connectBtn.addEventListener('click', () => {
      const hubId = hubIdInput.value.trim().toUpperCase();
      if (!hubId) {
        alert("Please enter a Hub ID");
        return;
      }

      if (client) {
        client.end();
      }

      currentHubId = hubId;
      setStatus('connecting', 'Connecting...');
      output.innerHTML = '';
      appendOutput(`[System] Connecting to Hub ${currentHubId} via secure WebSockets...\n`, 'system');

      const topicPresence = `ab6/robot/${currentHubId}/presence`;
      const lwt = {
        topic: topicPresence,
        payload: JSON.stringify({ type: 'leave', clientId: clientId }),
        qos: 0,
        retain: false
      };

      client = mqtt.connect('wss://broker.emqx.io:8084/mqtt', { will: lwt });

      // --- Try local WebSocket first, but don't block on it ---
      // On remote devices this will fail silently; the tunnel URL from MQTT will take over.
      connectLocalWS();

      client.on('connect', () => {
        const topicOut = `ab6/robot/${currentHubId}/out`;
        const topicStatus = `ab6/robot/${currentHubId}/status`;
        const topicStats = `ab6/robot/${currentHubId}/stats`;
        const topicTunnel = `ab6/robot/${currentHubId}/tunnel`;

        client.subscribe([topicOut, topicStatus, topicStats, topicTunnel], (err) => {
          if (!err) {
            setStatus('connecting', 'Waiting for Hub...');
            client.publish(topicPresence, JSON.stringify({ type: 'join', clientId: clientId }));
          } else {
            setStatus('disconnected', 'Subscription Error');
            appendOutput(`[Error] ${err.message}\n`, 'error');
          }
        });
      });

      client.on('message', (topic, message) => {
        try {
          const payload = JSON.parse(message.toString());
          if (payload.type === 'connection') {
            if (payload.status === 'online') {
              setStatus('connected', 'Connected');
              runBtn.disabled = false;
              stopBtn.disabled = false;
              statsSection.style.display = 'grid';
              appendOutput("[System] Hub is Online!\n", 'system');
            } else {
              setStatus('disconnected', 'Hub Offline');
              appendOutput("[System] Hub went offline.\n", 'error');
            }
          } else if (payload.type === 'stats') {
            statUsers.textContent = payload.users || 0;
            statRan.textContent = payload.ran || 0;
            statPending.textContent = payload.pending || 0;
          } else if (payload.type === 'ports') {
            const currentSelection = targetSlot.value;
            targetSlot.innerHTML = '<option value="">Any Available</option>';
            for (const [slot, info] of Object.entries(payload.ports)) {
                if (info.status === 'connected' || info.status === 'running') {
                    const opt = document.createElement('option');
                    opt.value = slot;
                    opt.textContent = `${slot} (${info.robot || 'unknown'}) - ${info.status}`;
                    targetSlot.appendChild(opt);
                }
            }
            if (payload.ports[currentSelection]) {
                 targetSlot.value = currentSelection;
            }
          } else if (payload.type === 'job_status') {
            // Only use MQTT job_status if WS is not connected
            if (!wsConnected) setJobStatus(payload.state, payload.message);
          } else if (payload.type === 'status') {
            appendOutput(`[Status] ${payload.message}\n`, 'system');
          } else if (payload.type === 'output') {
            // Only use MQTT output if WS is not connected (WS is faster)
            if (!wsConnected) {
              appendOutput(payload.data?.data || '');
              updateLatency(payload.hub_ts);
            }
          } else if (payload.type === 'tunnel') {
            // Hub sent its ngrok public WebSocket URL — connect to it!
            if (payload.ws_url) {
              tunnelUrl = payload.ws_url;  // Always cache the latest URL
              if (!wsConnected) {
                appendOutput(`[System] Tunnel detected: connecting...\n`, 'system');
                connectLocalWS(payload.ws_url);
              }
            }
          } else if (payload.type === 'finished') {
            if (!wsConnected) appendOutput(`\n[Finished] ${payload.message}\n\n`, 'system');
          }
        } catch (e) {
          console.error("Invalid JSON message", e);
        }
      });

      client.on('error', (err) => {
        setStatus('disconnected', 'Error');
        appendOutput(`[Error] ${err.message}\n`, 'error');
      });

      client.on('close', () => {
        setStatus('disconnected', 'Disconnected');
      });
    });

    // ------------------------------------------------------------------
    // WebSocket connection (LAN or Tunnel)
    // ------------------------------------------------------------------
    let tunnelUrl = null;  // Cached tunnel URL from MQTT
    let wsReconnectTimer = null; // Reconnection debounce

    function connectLocalWS(overrideUrl) {
      if (wsReconnectTimer) {
        clearTimeout(wsReconnectTimer);
        wsReconnectTimer = null;
      }
      if (wsClient) {
        try { 
          // Clear handlers to avoid firing onclose when we intentionally close it
          wsClient.onclose = null;
          wsClient.onerror = null;
          wsClient.onmessage = null;
          wsClient.onopen = null;
          wsClient.close(); 
        } catch(e) {}
      }
      wsConnected = false;
      wsIndicator.textContent = '⏳ WS…';
      wsIndicator.style.background = '#374151';
      wsIndicator.style.color = '#9ca3af';

      let wsUrl;
      let isTunnel = false;

      if (overrideUrl) {
        // Tunnel URL provided by MQTT (ngrok public URL)
        wsUrl = overrideUrl;
        tunnelUrl = overrideUrl;
        isTunnel = true;
      } else if (tunnelUrl) {
        // Reuse previously received tunnel URL
        wsUrl = tunnelUrl;
        isTunnel = true;
      } else {
        // Try local LAN connection
        let wsHost = window.location.hostname || 'localhost';
        if (wsHost === 'dharmpatelpro.github.io') {
            wsHost = 'localhost';
        }
        wsUrl = `ws://${wsHost}:5057`;
      }

      try {
        wsClient = new WebSocket(wsUrl);
      } catch (e) {
        console.warn('WS connect failed:', e);
        // If LAN fails, don't keep retrying — wait for tunnel URL from MQTT
        if (!isTunnel) {
          console.log('LAN WS failed, waiting for tunnel URL from MQTT...');
        } else {
          wsReconnectTimer = setTimeout(() => { if (currentHubId) connectLocalWS(); }, 5000);
        }
        return;
      }

      wsClient.onopen = () => {
        wsConnected = true;
        if (isTunnel) {
          wsIndicator.textContent = '🌐 Tunnel';
          wsIndicator.style.background = '#4c1d95';
          wsIndicator.style.color = '#c4b5fd';
          console.log('WebSocket connected via ngrok tunnel');
        } else {
          wsIndicator.textContent = '⚡ LAN';
          wsIndicator.style.background = '#065f46';
          wsIndicator.style.color = '#34d399';
          console.log('Local WebSocket connected — using LAN-speed output');
        }
      };

      wsClient.onmessage = (event) => {
        try {
          const payload = JSON.parse(event.data);
          if (payload.type === 'output') {
            appendOutput(payload.data?.data || '');
            updateLatency(payload.hub_ts);
          } else if (payload.type === 'job_status') {
            setJobStatus(payload.state, payload.message);
          } else if (payload.type === 'finished') {
            appendOutput(`\n[Finished] ${payload.message}\n\n`, 'system');
          }
        } catch (e) {
          console.error('WS parse error', e);
        }
      };

      wsClient.onclose = () => {
        wsConnected = false;
        wsIndicator.textContent = '☁️ Cloud';
        wsIndicator.style.background = '#1e3a5f';
        wsIndicator.style.color = '#60a5fa';
        console.log('WS disconnected, falling back to MQTT');
        // Retry connection after 5 seconds (try tunnel first, then LAN)
        wsReconnectTimer = setTimeout(() => { if (currentHubId) connectLocalWS(); }, 5000);
      };

      wsClient.onerror = (e) => {
        console.warn('WS error:', e);
      };
    }

    runBtn.addEventListener('click', () => {
      if (!client || !client.connected || !currentHubId) {
        alert("Not connected to a Hub.");
        return;
      }

      output.innerHTML = '';
      const topicRun = `ab6/robot/${currentHubId}/run`;
      const payload = JSON.stringify({
        type: 'run_code',
        role: 'browser',
        data: { 
          code: code.value, 
          mode: mode.value,
          target_slot: targetSlot.value || null
        }
      });

      appendOutput(`[System] Executing script on ${targetSlot.value || 'any available robot'}...\n`, 'system');
      setJobStatus('waiting', 'Submitted to queue...');
      client.publish(topicRun, payload);
    });

    stopBtn.addEventListener('click', () => {
      if (!client || !client.connected || !currentHubId) {
        appendOutput("[Error] Not connected to a Hub.\n", 'error');
        return;
      }
      
      if (!targetSlot.value) {
        appendOutput("[Error] Please select a specific Target Robot to stop.\n", 'error');
        return;
      }

      const topicRun = `ab6/robot/${currentHubId}/run`;
      const payload = JSON.stringify({
        type: 'stop_code',
        target_slot: targetSlot.value
      });

      appendOutput(`[System] Sending Stop Command to ${targetSlot.value}...\n`, 'error');
      client.publish(topicRun, payload);
    });
  </script>
</body>
</html>
